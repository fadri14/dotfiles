format = """
[тЦСтЦТтЦУ](fg:#730505)\                                                                                                                                                                                                                                                                                                                                                   
[ юпЖ яМГ юЯЕ ](fg:#f1efef bg:#730505)\                                                                                                                                                                                                                                                                                                                                                   
[юВ░](fg:#730505 bg:#711313)\                                                                                                                                                                                                                                                                                                                                                   
$directory\
[юВ░](fg:#711313 bg:#6f2121)\                                                                                                                                                                                                                                                                                                                                                   
$git_branch\
$git_status\
$git_metrics\
[юВ░](fg:#6f2121 bg:#6f2121)\                                                                                                                                                                                                                                                                                                                                                   
[юВ░ ](fg:#6f2121)\                                                                                                                                                                                                                                                                                                                                                   
"""

right_format = """
[юВ▓](fg:#711313)\                                                                                                                                                                                                                                                                                                                                                  
$time\
$cmd_duration\
$character\
[тЦУтЦТтЦС](fg:#711313)\                                                                                                                                                                                                                                                                                                                                                  
"""

add_newline = false

[directory]
home_symbol = "яАХ "
truncation_symbol = "тАж/"
truncate_to_repo = false
read_only = "ґ░ТГ"
style = "fg:#f1efef bg:#711313"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = "яРШ"
style = "fg:#f1efef bg:#6f2121"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "┬▒"
style = "fg:#f1efef bg:#6f2121"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#f1efef bg:#711313"
format = '[$timeяР║ ]($style)'

[character]
format = "$symbol"
success_symbol = '[яБШ ](fg:#f1efef bg:#711313)' 
error_symbol = '[юкЗ ](fg:#f1efef bg:#711313)'

[cmd_duration]
style = "fg:#f1efef bg:#711313"
format = "[$duration]($style)"

