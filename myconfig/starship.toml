add_newline = false

[directory]
home_symbol = "пҖ• "
truncation_symbol = "вҖҰ/"
truncate_to_repo = false
read_only = "у°’ғ"
style = "fg:#090c0c bg:#9A8CCD"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = "пҗҳ"
style = "fg:#090c0c bg:#d864a1"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "Вұ"
style = "fg:#090c0c bg:#d864a1"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#090c0c bg:#9A8CCD"
format = '[$timeпҗә ]($style)'

[character]
format = "$symbol"
success_symbol = '[пҒҳ ](fg:#090c0c bg:#9A8CCD)' 
error_symbol = '[оӘҮ ](fg:#090c0c bg:#9A8CCD)'

[cmd_duration]
style = "fg:#090c0c bg:#9A8CCD"
format = "[$duration]($style)"

