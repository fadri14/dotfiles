format = """
[░▒▓](fg:#5cb4f9)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
[    ](fg:#090c0c bg:#5cb4f9)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
[](fg:#5cb4f9 bg:#AB9EDE)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
$directory\
[](fg:#AB9EDE bg:#fa88c4)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
$git_branch\
$git_status\
$git_metrics\
[](fg:#fa88c4 bg:#fa88c4)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
[ ](fg:#fa88c4)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
"""

right_format = """
[](fg:#AB9EDE)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
$time\
$cmd_duration\
$character\
[▓▒░](fg:#AB9EDE)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
"""

add_newline = false

[directory]
home_symbol = " "
truncation_symbol = "…/"
truncate_to_repo = false
read_only = "󰒃"
style = "fg:#090c0c bg:#AB9EDE"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = ""
style = "fg:#090c0c bg:#fa88c4"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "±"
style = "fg:#090c0c bg:#fa88c4"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#090c0c bg:#AB9EDE"
format = '[$time ]($style)'

[character]
format = "$symbol"
success_symbol = '[ ](fg:#090c0c bg:#AB9EDE)' 
error_symbol = '[ ](fg:#090c0c bg:#AB9EDE)'

[cmd_duration]
style = "fg:#090c0c bg:#AB9EDE"
format = "[$duration]($style)"

