add_newline = false

[directory]
home_symbol = "пҖ• "
truncation_symbol = "вҖҰ/"
truncate_to_repo = false
read_only = "у°’ғ"
style = "fg:#090c0c bg:#CC726D"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = "пҗҳ"
style = "fg:#090c0c bg:#b5518d"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "Вұ"
style = "fg:#090c0c bg:#b5518d"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#090c0c bg:#CC726D"
format = '[$timeпҗә ]($style)'

[character]
format = "$symbol"
success_symbol = '[пҒҳ ](fg:#090c0c bg:#CC726D)' 
error_symbol = '[оӘҮ ](fg:#090c0c bg:#CC726D)'

[cmd_duration]
style = "fg:#090c0c bg:#CC726D"
format = "[$duration]($style)"

