format = """
[░▒▓](fg:#136fb5)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
[    ](fg:#f1efef bg:#136fb5)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
[](fg:#136fb5 bg:#69518D)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
$directory\
[](fg:#69518D bg:#bf3466)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
$git_branch\
$git_status\
$git_metrics\
[](fg:#bf3466 bg:#bf3466)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
[ ](fg:#bf3466)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
"""

right_format = """
[](fg:#69518D)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
$time\
$cmd_duration\
$character\
[▓▒░](fg:#69518D)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
"""

add_newline = false

[directory]
home_symbol = " "
truncation_symbol = "…/"
truncate_to_repo = false
read_only = "󰒃"
style = "fg:#f1efef bg:#69518D"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = ""
style = "fg:#f1efef bg:#bf3466"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "±"
style = "fg:#f1efef bg:#bf3466"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#f1efef bg:#69518D"
format = '[$time ]($style)'

[character]
format = "$symbol"
success_symbol = '[ ](fg:#f1efef bg:#69518D)' 
error_symbol = '[ ](fg:#f1efef bg:#69518D)'

[cmd_duration]
style = "fg:#f1efef bg:#69518D"
format = "[$duration]($style)"

