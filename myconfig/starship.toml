format = """
[░▒▓](fg:#0f0b44)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
[    ](fg:#f1efef bg:#0f0b44)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
[](fg:#0f0b44 bg:#20249A)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
$directory\
[](fg:#20249A bg:#323ef1)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
$git_branch\
$git_status\
$git_metrics\
[](fg:#323ef1 bg:#323ef1)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
[ ](fg:#323ef1)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
"""

right_format = """
[](fg:#20249A)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
$time\
$cmd_duration\
$character\
[▓▒░](fg:#20249A)\                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
"""

add_newline = false

[directory]
home_symbol = " "
truncation_symbol = "…/"
truncate_to_repo = false
read_only = "󰒃"
style = "fg:#f1efef bg:#20249A"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = ""
style = "fg:#f1efef bg:#323ef1"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "±"
style = "fg:#f1efef bg:#323ef1"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#f1efef bg:#20249A"
format = '[$time ]($style)'

[character]
format = "$symbol"
success_symbol = '[ ](fg:#f1efef bg:#20249A)' 
error_symbol = '[ ](fg:#f1efef bg:#20249A)'

[cmd_duration]
style = "fg:#f1efef bg:#20249A"
format = "[$duration]($style)"

