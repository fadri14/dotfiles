add_newline = false

[directory]
home_symbol = "пҖ• "
truncation_symbol = "вҖҰ/"
truncate_to_repo = false
read_only = "у°’ғ"
style = "fg:#090c0c bg:#15E4B4"
format = "[ $path $read_only ]($style)"

[git_branch]
symbol = "пҗҳ"
style = "fg:#090c0c bg:#00ff7f"
format = '[ $symbol $branch ]($style)'

[git_status]
untracked = "Вұ"
style = "fg:#090c0c bg:#00ff7f"
format = '[($all_status$ahead_behind )]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#090c0c bg:#15E4B4"
format = '[$timeпҗә ]($style)'

[character]
format = "$symbol"
success_symbol = '[пҒҳ ](fg:#090c0c bg:#15E4B4)' 
error_symbol = '[оӘҮ ](fg:#090c0c bg:#15E4B4)'

[cmd_duration]
style = "fg:#090c0c bg:#15E4B4"
format = "[$duration]($style)"

