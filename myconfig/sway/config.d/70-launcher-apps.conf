mode "application" {
        bindsym f exec librewolf ; mode "default"
        bindsym s exec signal-desktop ; mode "default"
        bindsym d exec discord ; mode "default"
        bindsym y exec freetube ; mode "default"
        bindsym n exec netflix ; mode "default"
        bindsym m exec spotify ; mode "default"
        bindsym e exec nautilus ; mode "default"
        bindsym p exec evince ; mode "default"
        bindsym a exec gnome-calculator ; mode "default"
        bindsym x exec GDK_BACKEND=wayland xournalpp ; mode "default"
        bindsym i exec system-config-printer ; mode "default"
        bindsym b exec blueman-manager ; mode "default"
        bindsym t exec alacritty -e nvim /home/adrien/Notes/todo.norg ; mode "default"
        bindsym r exec alacritty -e ranger ; mode "default"
        bindsym g exec alacritty -e glances ; mode "default"
        bindsym w exec /home/adrien/.config/myscripts/switch_gamma ; mode "default"

        bindsym Return mode "default"
        bindsym Escape mode "default"
}

bindsym $mod+a mode "application"
